name: backupster-agent
arch: amd64
platform: linux
version: ${VERSION}
section: utils
priority: optional
maintainer: Backupster <support@backupster.io>
vendor: Backupster
homepage: https://backupster.io
license: FSL-1.1-Apache-2.0

description: |
  Agent service for automated database and file-set backups.
  Runs as a systemd service. Pairs with the dashboard at https://app.backupster.io.

contents:
  - src: ./publish/linux-x64/BackupsterAgent
    dst: /usr/bin/backupster-agent
    file_info:
      mode: 0755

  - src: ./packaging/systemd/backupster-agent.service
    dst: /usr/lib/systemd/system/backupster-agent.service
    file_info:
      mode: 0644

  - src: ./packaging/etc/env.example
    dst: /etc/backupster-agent/env
    type: config|noreplace
    file_info:
      mode: 0640
      owner: root
      group: root

  - src: ./LICENSE
    dst: /usr/share/doc/backupster-agent/LICENSE

  - src: ./NOTICE
    dst: /usr/share/doc/backupster-agent/NOTICE

scripts:
  postinstall: ./packaging/scripts/postinst.sh
  preremove: ./packaging/scripts/prerm.sh
  postremove: ./packaging/scripts/postrm.sh

overrides:
  rpm:
    file_name_template: "backupster-agent-{{ .Version }}.x86_64"
  deb:
    file_name_template: "backupster-agent_{{ .Version }}_amd64"
