name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── self-contained binaries ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained (${{ matrix.rid }})
        run: |
          dotnet publish BackupsterAgent/BackupsterAgent.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/${{ matrix.rid }}

      - name: Create archive
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../BackupsterAgent-${{ github.ref_name }}-${{ matrix.rid }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: BackupsterAgent-${{ matrix.rid }}
          path: BackupsterAgent-${{ github.ref_name }}-${{ matrix.rid }}.zip

  # ── Linux packages (.deb + .rpm via nfpm) ────────────────────────────────────
  package-linux:
    name: Package (.deb + .rpm)
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download linux-x64 artifact
        uses: actions/download-artifact@v8
        with:
          name: BackupsterAgent-linux-x64
          path: ./

      - name: Unzip linux-x64 archive
        run: |
          mkdir -p ./publish/linux-x64
          unzip -o BackupsterAgent-${{ github.ref_name }}-linux-x64.zip -d ./publish/linux-x64

      - name: Install nfpm
        run: |
          NFPM_VERSION=2.41.0
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VERSION}/nfpm_${NFPM_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      - name: Build .deb
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm pkg --packager deb --config packaging/nfpm.yaml --target ./

      - name: Build .rpm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: nfpm pkg --packager rpm --config packaging/nfpm.yaml --target ./

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: BackupsterAgent-linux-packages
          path: |
            *.deb
            *.rpm

  # ── Docker image → ghcr.io ───────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          GHCR="ghcr.io/${{ github.repository_owner }}/backupster-agent"
          HUB="docker.io/mistekdev/backupster-agent"
          if [[ "${{ github.ref_name }}" == *e ]]; then
            printf "tags<<EOF\n${GHCR}:${{ github.ref_name }}\n${HUB}:${{ github.ref_name }}\nEOF\n" >> "$GITHUB_OUTPUT"
          else
            printf "tags<<EOF\n${GHCR}:${{ github.ref_name }}\n${GHCR}:latest\n${HUB}:${{ github.ref_name }}\n${HUB}:latest\nEOF\n" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # ── GitHub Release with artifacts ───────────────────────────────────────────
  release:
    name: Release
    needs: [build, docker, package-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          PRERELEASE_FLAG=""
          [[ "${{ github.ref_name }}" =~ [eb]$ ]] && PRERELEASE_FLAG="--prerelease"
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            $PRERELEASE_FLAG \
            artifacts/*.zip artifacts/*.deb artifacts/*.rpm
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
