name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── self-contained binaries ──────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.rid }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rid: [linux-x64, win-x64]
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained (${{ matrix.rid }})
        run: |
          dotnet publish DbBackupAgent/DbBackupAgent.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -o ./publish/${{ matrix.rid }}

      - name: Create archive
        run: |
          cd publish/${{ matrix.rid }}
          zip -r ../../DbBackupAgent-${{ github.ref_name }}-${{ matrix.rid }}.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DbBackupAgent-${{ matrix.rid }}
          path: DbBackupAgent-${{ github.ref_name }}-${{ matrix.rid }}.zip

  # ── Docker image → ghcr.io ───────────────────────────────────────────────────
  docker:
    name: Docker
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

  # ── GitHub Release with artifacts ───────────────────────────────────────────
  release:
    name: Release
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
